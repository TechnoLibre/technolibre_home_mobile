<!doctype html>
<html lang="fr" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>ERPLibre Home</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https: wss:; media-src 'self' blob:; font-src 'self' data:;"
    />

    <link rel="icon" type="image/x-icon" href="./assets/icon/favicon.ico" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./css/style.scss" />
    <meta name="theme-color" content="#31d53d" />
  </head>
  <body>
    <!-- Skip link: visible on keyboard focus, jumps to main content -->
    <a href="#main" class="skip-link">Aller au contenu principal</a>
    <style>
      @keyframes boot-spin   { to { transform: rotate(360deg); } }
      @keyframes logo-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      #boot-logo { transition: transform 0.1s; cursor: pointer; user-select: none; }
      #boot-logo.spinning { animation: logo-rotate 0.6s ease-in-out forwards; }
    </style>
    <div id="boot-screen" role="status" aria-live="polite" aria-label="Chargement de l'application" style="
      position: fixed; inset: 0;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      font-size: 14px;
      gap: 16px;
      z-index: 9999;
    ">
      <img
        id="boot-logo"
        src="./assets/imgs/logo.png"
        alt="Logo ERPLibre"
        style="width: 120px; height: 120px; object-fit: contain;"
      />
      <div style="display:flex; align-items:center; gap:10px;">
        <div aria-hidden="true" style="
          width: 20px; height: 20px; flex-shrink: 0;
          border: 2px solid #444;
          border-top-color: #fff;
          border-radius: 50%;
          animation: boot-spin 0.8s linear infinite;
        "></div>
        <span id="boot-step">Démarrage…</span>
      </div>
    </div>
    <script>
      (function () {
        var logo = document.getElementById('boot-logo');
        logo.addEventListener('click', function () {
          logo.classList.remove('spinning');
          void logo.offsetWidth;
          logo.classList.add('spinning');
          logo.addEventListener('animationend', function () {
            logo.classList.remove('spinning');
          }, { once: true });
        });
      })();
    </script>
    <script type="module" src="./js/app.ts"></script>
  </body>
</html>
